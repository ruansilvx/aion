name: aion
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  # Required only because Flutter's TextField (the one Material widget the
  # design allows, see design.md Material Coupling Audit) reads
  # MaterialLocalizations internally even without MaterialApp/Scaffold.
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Routing
  go_router: ^17.3.0

  # Local persistence
  drift: ^2.22.1
  drift_flutter: ^0.3.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.3.1

  # IDs
  uuid: ^4.5.1

  # Directory picker (desktop) — features/projects new-project flow
  file_selector: ^1.0.3

  # Used directly by AppDatabase to resolve the mobile per-project data
  # directory (previously only a transitive dependency via drift_flutter)
  path_provider: ^2.1.0

  # Localization (ARB-based, see aion-arch/changes/intl-string-retrofit)
  intl: ^0.20.2

  # Icons
  # phosphor_flutter is unmaintained against Flutter SDKs where IconData is a
  # final class; phosphoricons_flutter is a Dart 3.x-compatible replacement
  # with the same icon set and a near-identical PhosphorIcon/PhosphorIcons API.
  phosphoricons_flutter: ^1.0.0

  # Serialization (data layer models)
  json_annotation: ^4.9.0

  # Used directly by AionColors/AionThemeData for @immutable
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  json_serializable: ^6.9.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  assets:
    - assets/baseline/0.1.0/
    - assets/baseline/0.1.0/skills/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-VariableFont_wght.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-VariableFont_wght.ttf
          style: italic
