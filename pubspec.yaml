name: aion
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Routing
  go_router: ^17.3.0

  # Local persistence
  drift: ^2.22.1
  drift_flutter: ^0.3.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.3.1

  # Serialization (data layer models)
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  json_serializable: ^6.9.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

